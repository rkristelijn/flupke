# SonarCloud configuration for flupke
# @see https://sonarcloud.io/project/overview?id=rkristelijn_flupke

sonar.projectKey=rkristelijn_flupke
sonar.organization=rkristelijn

sonar.sources=packages
sonar.tests=packages
sonar.test.inclusions=**/test/**

# Exclusions:
# - test/bench: not production code, intentionally has empty functions and mocks
# - dayjs.min.js + plugins: vendored third-party (MIT), not our code to maintain
# - node_modules/scripts: tooling, not shipped to users
# - picomatch/path-to-regexp/glob-to-regexp/braces/minimatch: these ARE regex/glob libraries —
#   constructing RegExp from user patterns is their documented purpose,
#   not a vulnerability. Input length is bounded by the caller (Express router
#   limits path length, webpack limits glob length).
sonar.exclusions=**/test/**,**/bench/**,**/node_modules/**,scripts/**,packages/moment/src/dayjs.min.js,packages/moment/src/plugin/**,packages/picomatch/**,packages/path-to-regexp/**,packages/glob-to-regexp/**,packages/braces/**,packages/minimatch/**,packages/cli/**

sonar.javascript.lcov.reportPaths=coverage.lcov

# Suppress S4784 (Regular expressions should not be vulnerable to DoS)
# Reason: picomatch, path-to-regexp, and glob-to-regexp exist specifically
# to convert glob/path patterns into RegExp. This is not user-controlled input
# reaching a regex — it is developer-defined route patterns at startup time.
# Additionally, our ms package caps input at 100 chars as defense-in-depth.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S4784
sonar.issue.ignore.multicriteria.e1.resourceKey=packages/*/src/index.js
