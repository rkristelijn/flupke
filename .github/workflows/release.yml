name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['packages/*/src/**']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Calculate version from commits
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          CURRENT=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -q "^feat"; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif echo "$COMMITS" | grep -q "^fix\|^perf"; then
            PATCH=$((PATCH + 1))
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        run: |
          RELEASE_VERSION=${{ steps.version.outputs.version }}
          echo "## v${RELEASE_VERSION}" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" >> /tmp/release-notes.md

      - name: Update versions
        if: steps.version.outputs.skip == 'false'
        run: |
          RELEASE_VERSION=${{ steps.version.outputs.version }}
          for pkg in packages/*/package.json; do
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${RELEASE_VERSION}\"/" "$pkg"
          done

      - name: Generate catalog
        if: steps.version.outputs.skip == 'false'
        run: node scripts/generate-catalog.js

      - name: Commit and tag
        if: steps.version.outputs.skip == 'false'
        run: |
          RELEASE_VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release/v${RELEASE_VERSION}
          git add -A
          git commit -m "chore: release v${RELEASE_VERSION}" || true
          git tag "v${RELEASE_VERSION}"
          git push origin release/v${RELEASE_VERSION} --tags

      - name: Create PR
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_VERSION=${{ steps.version.outputs.version }}
          gh pr create \
            --title "chore: release v${RELEASE_VERSION}" \
            --body "$(cat /tmp/release-notes.md)" \
            --base main \
            --head release/v${RELEASE_VERSION}

      - name: Publish to npm
        if: steps.version.outputs.skip == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              npm publish "$pkg" --access public || true
            fi
          done

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_VERSION=${{ steps.version.outputs.version }}
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --notes-file /tmp/release-notes.md
