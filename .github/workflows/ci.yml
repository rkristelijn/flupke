name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: node --test packages/*/test/*.test.js
      - run: node bench/compare-isolated.js

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: rkristelijn/cpm
          path: .cpm-tool
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: cpm checks
        run: |
          bash .cpm-tool/checks/javascript/check-v8-perf.sh
          bash .cpm-tool/checks/javascript/check-ts-dangerous.sh
          bash .cpm-tool/checks/javascript/check-package-json.sh
