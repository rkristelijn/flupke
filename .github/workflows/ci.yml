name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: node --test packages/*/test/*.test.js
      - run: node bench/compare-isolated.js

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Install cpm
        run: curl -fsSL https://raw.githubusercontent.com/rkristelijn/cpm/main/install.sh | bash
      - name: cpm scan
        run: cpm scan .
