name: Ecosystem CI

on:
  schedule:
    # Every 2 hours — rotates through frameworks via hour-based selection
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework to scan (or "all")'
        default: 'all'
  push:
    paths:
      - 'packages/*/src/**'
      - 'scripts/extract-coupling*'
      - 'scripts/fingerprint-framework.sh'
      - 'scripts/generate-contracts.js'

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        run: |
          # All framework+version combos
          ALL='[
            {"framework":"express","version":"4.21.2"},
            {"framework":"express","version":"5.2.1"},
            {"framework":"nestjs","version":"10.4.15","repo":"https://github.com/nestjs/nest.git"},
            {"framework":"nestjs","version":"11.1.24","repo":"https://github.com/nestjs/nest.git"},
            {"framework":"jest","version":"29.7.0","repo":"https://github.com/jestjs/jest.git"},
            {"framework":"jest","version":"30.4.2","repo":"https://github.com/jestjs/jest.git"},
            {"framework":"nuxt","version":"3.16.2","repo":"https://github.com/nuxt/nuxt.git"},
            {"framework":"nuxt","version":"4.4.6","repo":"https://github.com/nuxt/nuxt.git"},
            {"framework":"next","version":"15.3.3","repo":"https://github.com/vercel/next.js.git"},
            {"framework":"next","version":"16.2.6","repo":"https://github.com/vercel/next.js.git"}
          ]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.framework }}" != "all" ]; then
            # Manual: filter to requested framework
            MATRIX=$(echo "$ALL" | jq -c "[.[] | select(.framework==\"${{ inputs.framework }}\")]")
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled: pick one framework pair based on hour (rotates through 5 frameworks)
            HOUR=$(date +%H)
            INDEX=$(( (HOUR / 2) % 5 ))
            FRAMEWORKS=("express" "nestjs" "jest" "nuxt" "next")
            FW="${FRAMEWORKS[$INDEX]}"
            MATRIX=$(echo "$ALL" | jq -c "[.[] | select(.framework==\"$FW\")]")
          else
            # Push: run all
            MATRIX="$ALL"
          fi

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Selected: $MATRIX" >&2

  fingerprint:
    needs: select
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract coupling fingerprint
        run: |
          chmod +x scripts/extract-coupling.sh scripts/fingerprint-framework.sh
          ./scripts/fingerprint-framework.sh ${{ matrix.framework }} ${{ matrix.version }}

      - name: Check for API surface drift
        run: |
          STORED="data/fingerprints/${{ matrix.framework }}/${{ matrix.version }}.json"
          NEW="data/fingerprints/${{ matrix.framework }}/${{ matrix.version }}.json"
          if [ -f "$STORED" ]; then
            node -e "
              const fs = require('fs');
              const stored = JSON.parse(fs.readFileSync('$STORED','utf8'));
              const current = JSON.parse(fs.readFileSync('$NEW','utf8'));
              const sigA = new Set(stored.signatures.map(s=>s.package+'|'+s.signature));
              const sigB = new Set(current.signatures.map(s=>s.package+'|'+s.signature));
              const added = [...sigB].filter(s=>!sigA.has(s));
              const removed = [...sigA].filter(s=>!sigB.has(s));
              if (added.length || removed.length) {
                console.log('::warning::API surface drift detected for ${{ matrix.framework }}@${{ matrix.version }}');
                if (added.length) console.log('New signatures: ' + added.length);
                if (removed.length) console.log('Removed signatures: ' + removed.length);
                added.slice(0,10).forEach(s=>console.log('  + '+s));
                removed.slice(0,10).forEach(s=>console.log('  - '+s));
              } else {
                console.log('✓ No drift in ${{ matrix.framework }}@${{ matrix.version }}');
              }
            "
          fi

      - name: Generate + run contract tests
        run: |
          PKGS=$(ls packages/*/package.json | sed 's|packages/||;s|/package.json||')
          for pkg in $PKGS; do
            ./scripts/extract-coupling.sh "$pkg" ".tmp/frameworks/${{ matrix.framework }}-${{ matrix.version }}" 2>/dev/null | \
              node scripts/generate-contracts.js --pkg "$pkg" --out "packages/$pkg/test/" 2>/dev/null || true
          done
          node --test packages/*/test/contract.test.js

      - name: Upload fingerprint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fingerprint-${{ matrix.framework }}-${{ matrix.version }}
          path: data/fingerprints/${{ matrix.framework }}/${{ matrix.version }}.json
