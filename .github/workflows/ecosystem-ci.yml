name: Ecosystem CI

on:
  schedule:
    # Every 2 hours — rotates through frameworks (48 frameworks ÷ 12 runs/day = ~4 days full cycle)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework to scan (name from data/frameworks.json, or "all")'
        default: 'all'
  push:
    paths:
      - 'packages/*/src/**'

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: pick
        run: |
          CONFIG="data/frameworks.json"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.framework }}" != "all" ]; then
            # Manual: specific framework
            MATRIX=$(jq -c "[.frameworks[] | select(.name==\"${{ inputs.framework }}\") | {name, repo, version: .versions[]}]" "$CONFIG")
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled: pick 2 frameworks based on run number (rotates through all)
            TOTAL=$(jq '.frameworks | length' "$CONFIG")
            HOUR=$(date +%H)
            DAY=$(date +%j)
            INDEX=$(( (DAY * 12 + HOUR / 2) % TOTAL ))
            INDEX2=$(( (INDEX + 1) % TOTAL ))
            MATRIX=$(jq -c "[(.frameworks[$INDEX], .frameworks[$INDEX2]) | {name, repo, version: .versions[]}]" "$CONFIG")
          else
            # Push: top 5 priority frameworks only (fast feedback)
            MATRIX=$(jq -c '[.frameworks[:5][] | {name, repo, version: .versions[]}]' "$CONFIG")
          fi

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  fingerprint:
    needs: select
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone framework
        run: |
          mkdir -p .tmp/frameworks
          git clone --depth 1 --branch "v${{ matrix.version }}" \
            "https://github.com/${{ matrix.repo }}.git" \
            ".tmp/frameworks/${{ matrix.name }}-${{ matrix.version }}" 2>/dev/null || \
          git clone --depth 1 --branch "${{ matrix.version }}" \
            "https://github.com/${{ matrix.repo }}.git" \
            ".tmp/frameworks/${{ matrix.name }}-${{ matrix.version }}" 2>/dev/null || \
          git clone --depth 1 \
            "https://github.com/${{ matrix.repo }}.git" \
            ".tmp/frameworks/${{ matrix.name }}-${{ matrix.version }}" 2>/dev/null || true

      - name: Extract fingerprint
        run: |
          chmod +x scripts/extract-coupling.sh
          DIR=".tmp/frameworks/${{ matrix.name }}-${{ matrix.version }}"
          [ -d "$DIR" ] || exit 0

          mkdir -p "data/fingerprints/${{ matrix.name }}"
          ALL="[]"
          for pkg in $(ls -d packages/*/package.json | sed 's|packages/||;s|/package.json||'); do
            RESULT=$(./scripts/extract-coupling.sh "$pkg" "$DIR" 2>/dev/null || echo "[]")
            if [ "$RESULT" != "[]" ]; then
              ALL=$(echo "$ALL" | node -e "
                const fs=require('fs');
                const e=JSON.parse(fs.readFileSync('/dev/stdin','utf8'));
                const n=JSON.parse(process.argv[1]).map(x=>({...x,package:'$pkg'}));
                console.log(JSON.stringify([...e,...n]));
              " "$RESULT")
            fi
          done

          node -e "
            const d=JSON.parse(process.argv[1]);
            const fp={framework:'${{matrix.name}}',version:'${{matrix.version}}',
              generated:new Date().toISOString(),total_signatures:d.length,signatures:d};
            console.log(JSON.stringify(fp,null,2));
          " "$ALL" > "data/fingerprints/${{ matrix.name }}/${{ matrix.version }}.json"

      - name: Check for drift
        run: |
          FILE="data/fingerprints/${{ matrix.name }}/${{ matrix.version }}.json"
          [ -f "$FILE" ] || exit 0
          node -e "
            const fp=JSON.parse(require('fs').readFileSync('$FILE','utf8'));
            console.log('${{ matrix.name }}@${{ matrix.version }}: ' + fp.total_signatures + ' signatures across ' +
              new Set(fp.signatures.map(s=>s.package)).size + ' packages');
          "

      - name: Run contract tests
        run: |
          DIR=".tmp/frameworks/${{ matrix.name }}-${{ matrix.version }}"
          [ -d "$DIR" ] || exit 0
          for pkg in $(ls -d packages/*/package.json | sed 's|packages/||;s|/package.json||'); do
            ./scripts/extract-coupling.sh "$pkg" "$DIR" 2>/dev/null | \
              node scripts/generate-contracts.js --pkg "$pkg" --out "packages/$pkg/test/" 2>/dev/null || true
          done
          # Run contract tests (allow empty — some frameworks may not use any flupke packages)
          find packages/*/test/contract.test.js 2>/dev/null | head -1 | xargs -I{} node --test packages/*/test/contract.test.js || true

      - name: Upload fingerprint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fp-${{ matrix.name }}-${{ matrix.version }}
          path: data/fingerprints/${{ matrix.name }}/${{ matrix.version }}.json
          retention-days: 90
